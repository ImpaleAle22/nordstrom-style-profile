<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image URL Test</title>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .test-item {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 4px;
        }
        .test-item img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #f5f5f5;
        }
        .status {
            margin-top: 10px;
            padding: 5px;
            border-radius: 3px;
            font-size: 12px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            display: block;
            margin-top: 5px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>Image URL Test</h1>
    <p>Testing different image URL patterns to see which ones work</p>

    <div class="test-grid" id="testGrid"></div>

    <script>
        const testUrls = [
            {
                name: 'CLIP API (product-images)',
                url: 'http://localhost:5002/product-images/hm-kaggle-0691507001_flat_lay_01.jpg'
            },
            {
                name: 'CLIP API (product-images-unified) - SHOULD FAIL',
                url: 'http://localhost:5002/product-images-unified/hm-kaggle-0691507001_flat_lay_01.jpg'
            },
            {
                name: 'Next.js Proxy (product-images)',
                url: '/api/product-image?path=/product-images/hm-kaggle-0691507001_flat_lay_01.jpg'
            },
            {
                name: 'Next.js Proxy (product-images-unified) - SHOULD FAIL',
                url: '/api/product-image?path=/product-images-unified/hm-kaggle-0691507001_flat_lay_01.jpg'
            },
        ];

        const grid = document.getElementById('testGrid');

        testUrls.forEach(test => {
            const item = document.createElement('div');
            item.className = 'test-item';

            const title = document.createElement('strong');
            title.textContent = test.name;

            const img = document.createElement('img');
            img.src = test.url;

            const status = document.createElement('div');
            status.className = 'status';
            status.textContent = 'Loading...';

            const url = document.createElement('code');
            url.textContent = test.url;

            img.onload = () => {
                status.className = 'status success';
                status.textContent = '✅ Loaded successfully';
            };

            img.onerror = () => {
                status.className = 'status error';
                status.textContent = '❌ Failed to load';
            };

            item.appendChild(title);
            item.appendChild(img);
            item.appendChild(status);
            item.appendChild(url);

            grid.appendChild(item);
        });
    </script>
</body>
</html>
