<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Image Browser - Lifestyle Scanner Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            color: #222;
        }

        .header {
            background: white;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 600px;
        }

        .search-input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #0066cc;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #0066cc;
            color: white;
        }

        .btn-primary:hover {
            background: #0052a3;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .selection-bar {
            background: #10b981;
            color: white;
            padding: 15px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 80px;
            z-index: 99;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .selection-bar.active {
            display: flex;
        }

        .filters {
            background: white;
            padding: 20px;
            margin: 20px auto;
            max-width: 1600px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .filter-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }

        select, input[type="number"] {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .container {
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .image-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }

        .image-card.selected {
            box-shadow: 0 0 0 4px #10b981;
        }

        .image-wrapper {
            position: relative;
            padding-top: 66.67%; /* 3:2 aspect ratio */
            overflow: hidden;
            background: #f0f0f0;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .checkbox-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.2s;
        }

        .image-card.selected .checkbox-overlay {
            background: #10b981;
            border-color: #10b981;
        }

        .checkbox-overlay::after {
            content: '✓';
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        .image-card.selected .checkbox-overlay::after {
            display: block;
        }

        .image-info {
            padding: 15px;
        }

        .image-source {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .image-photographer {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0066cc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .success {
            background: #efe;
            color: #363;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .load-more {
            text-align: center;
            margin: 40px 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: #10b981;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>Fashion Image Browser</h1>
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="Search for fashion, outfits, style..." value="fashion woman outfit">
                <button class="btn btn-primary" onclick="search()">Search</button>
            </div>
            <button class="btn btn-secondary" onclick="clearSelection()">Clear Selection</button>
        </div>
    </div>

    <div class="selection-bar" id="selectionBar">
        <div>
            <strong id="selectionCount">0</strong> images selected
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-success" onclick="sendToScanner()">Send to Lifestyle Scanner</button>
            <button class="btn btn-secondary" onclick="clearSelection()">Clear</button>
        </div>
    </div>

    <div class="container">
        <div class="filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label class="filter-label">Source</label>
                    <select id="sourceSelect" onchange="changeSource()">
                        <option value="pexels">Pexels</option>
                        <option value="unsplash">Unsplash</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Per Page</label>
                    <input type="number" id="perPage" value="30" min="10" max="80" style="width: 80px;">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Scanner URL</label>
                    <input type="text" id="scannerUrl" value="http://localhost:3001/lifestyle-scan" style="width: 300px;">
                </div>
            </div>
        </div>

        <div class="stats">
            <span id="statsText">Ready to search</span>
        </div>

        <div id="message"></div>

        <div class="image-grid" id="imageGrid"></div>

        <div class="loading" id="loading" style="display:none;">
            <div class="spinner"></div>
            <div>Loading images...</div>
        </div>

        <div class="load-more" id="loadMore" style="display:none;">
            <button class="btn btn-primary" onclick="loadMore()">Load More</button>
        </div>
    </div>

    <!-- Send Modal -->
    <div class="modal" id="sendModal">
        <div class="modal-content">
            <div class="modal-header">Sending to Lifestyle Scanner</div>
            <div class="modal-body">
                <div id="sendStatus">Preparing to send images...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div id="sendProgress">0 / 0</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeSendModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let selectedImages = new Set();
        let currentPage = 1;
        let currentQuery = 'fashion woman outfit';
        let currentSource = 'pexels';
        let allImages = [];

        // Pexels API key (you'll need to add yours)
        const PEXELS_API_KEY = 'YOUR_PEXELS_API_KEY';

        // Initialize
        window.onload = () => {
            search();
        };

        function changeSource() {
            currentSource = document.getElementById('sourceSelect').value;
            currentPage = 1;
            allImages = [];
            document.getElementById('imageGrid').innerHTML = '';
            search();
        }

        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showMessage('Please enter a search term', 'error');
                return;
            }

            currentQuery = query;
            currentPage = 1;
            allImages = [];
            selectedImages.clear();
            updateSelectionBar();

            document.getElementById('imageGrid').innerHTML = '';
            await loadImages();
        }

        async function loadMore() {
            currentPage++;
            await loadImages();
        }

        async function loadImages() {
            const loading = document.getElementById('loading');
            const loadMoreBtn = document.getElementById('loadMore');
            const perPage = parseInt(document.getElementById('perPage').value);

            loading.style.display = 'block';
            loadMoreBtn.style.display = 'none';

            try {
                let images = [];
                if (currentSource === 'pexels') {
                    images = await fetchPexels(currentQuery, currentPage, perPage);
                } else {
                    images = await fetchUnsplash(currentQuery, currentPage, perPage);
                }

                allImages = allImages.concat(images);
                renderImages(images);

                document.getElementById('statsText').textContent =
                    `${allImages.length} images loaded | ${selectedImages.size} selected`;

                loadMoreBtn.style.display = 'block';
            } catch (error) {
                console.error('Error loading images:', error);
                showMessage('Error loading images: ' + error.message, 'error');
            } finally {
                loading.style.display = 'none';
            }
        }

        async function fetchPexels(query, page, perPage) {
            // Note: You need to add your Pexels API key above
            // Get one free at https://www.pexels.com/api/
            const url = `https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&page=${page}&per_page=${perPage}`;

            const response = await fetch(url, {
                headers: {
                    'Authorization': PEXELS_API_KEY
                }
            });

            if (!response.ok) {
                throw new Error('Pexels API error: ' + response.statusText);
            }

            const data = await response.json();
            return data.photos.map(photo => ({
                id: `pexels-${photo.id}`,
                url: photo.src.original,
                thumbnail: photo.src.large,
                photographer: photo.photographer,
                source: 'stock-pexels',
                sourceUrl: photo.url
            }));
        }

        async function fetchUnsplash(query, page, perPage) {
            // Note: Unsplash API requires an access key
            // Get one free at https://unsplash.com/developers
            const url = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&page=${page}&per_page=${perPage}&client_id=YOUR_UNSPLASH_ACCESS_KEY`;

            const response = await fetch(url);

            if (!response.ok) {
                throw new Error('Unsplash API error: ' + response.statusText);
            }

            const data = await response.json();
            return data.results.map(photo => ({
                id: `unsplash-${photo.id}`,
                url: photo.urls.full,
                thumbnail: photo.urls.regular,
                photographer: photo.user.name,
                source: 'stock-unsplash',
                sourceUrl: photo.links.html
            }));
        }

        function renderImages(images) {
            const grid = document.getElementById('imageGrid');

            images.forEach(image => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.id = `card-${image.id}`;
                card.onclick = () => toggleImage(image);

                card.innerHTML = `
                    <div class="image-wrapper">
                        <div class="checkbox-overlay"></div>
                        <img src="${image.thumbnail}" alt="${image.photographer}" loading="lazy">
                    </div>
                    <div class="image-info">
                        <div class="image-source">${image.source === 'stock-pexels' ? 'Pexels' : 'Unsplash'}</div>
                        <div class="image-photographer">by ${image.photographer}</div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function toggleImage(image) {
            const card = document.getElementById(`card-${image.id}`);

            if (selectedImages.has(image.id)) {
                selectedImages.delete(image.id);
                card.classList.remove('selected');
            } else {
                selectedImages.add(image.id);
                card.classList.add('selected');
            }

            updateSelectionBar();
        }

        function updateSelectionBar() {
            const bar = document.getElementById('selectionBar');
            const count = document.getElementById('selectionCount');

            count.textContent = selectedImages.size;

            if (selectedImages.size > 0) {
                bar.classList.add('active');
            } else {
                bar.classList.remove('active');
            }

            document.getElementById('statsText').textContent =
                `${allImages.length} images loaded | ${selectedImages.size} selected`;
        }

        function clearSelection() {
            selectedImages.clear();
            document.querySelectorAll('.image-card.selected').forEach(card => {
                card.classList.remove('selected');
            });
            updateSelectionBar();
        }

        async function sendToScanner() {
            if (selectedImages.size === 0) {
                showMessage('Please select at least one image', 'error');
                return;
            }

            const selectedImageData = allImages.filter(img => selectedImages.has(img.id));
            const scannerUrl = document.getElementById('scannerUrl').value;

            // Show modal
            document.getElementById('sendModal').classList.add('active');
            document.getElementById('sendStatus').textContent = 'Opening scanner in new tab...';
            document.getElementById('sendProgress').textContent = `Preparing ${selectedImageData.length} images`;

            // Build URL for batch scan
            const urls = selectedImageData.map(img => img.url);
            const source = currentSource === 'pexels' ? 'stock-pexels' : 'stock-unsplash';

            // Open scanner with batch URLs
            // The scanner will auto-populate the batch URLs field
            const urlsParam = encodeURIComponent(urls.join('\n'));
            const scannerTabUrl = `${scannerUrl}?batch_urls=${urlsParam}&source=${source}`;

            // Open in new tab
            window.open(scannerTabUrl, '_blank');

            // Update modal
            setTimeout(() => {
                document.getElementById('sendStatus').textContent = 'Scanner opened! Paste URLs and click "Scan All"';
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('sendProgress').textContent = `${selectedImageData.length} URLs ready`;
            }, 500);
        }

        function closeSendModal() {
            document.getElementById('sendModal').classList.remove('active');
            document.getElementById('progressFill').style.width = '0%';
        }

        function showMessage(message, type = 'success') {
            const msgDiv = document.getElementById('message');
            msgDiv.className = type;
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';

            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 5000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                clearSelection();
            }
            if (e.key === 'Enter' && e.target.id === 'searchInput') {
                search();
            }
        });
    </script>
</body>
</html>
